apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
    # START AFFINITY BLOCK
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
                  - key: node-role.kubernetes.io/master
                    operator: DoesNotExist
    # END AFFINITY BLOCK
      initContainers:
        - name: wait-db
          image: "postgres:16"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: tazama-shared-secrets
                  key: CONFIGURATION_DATABASE_PASSWORD
          command:
            - sh
            - -c
            - |
              until psql -h postgres -U postgres -d raw_history -c "SELECT 'pain013'::regclass;" >/dev/null 2>&1; do
                echo "Waiting for the full Tazama database schema to finish initializing..."
                sleep 2
              done
        - name: wait-valkey
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z valkey 6379; do sleep 2; done;']
      containers:
        - name: admin-service
          image: "{{ .Values.global.imageRegistry }}/admin-service:{{ .Values.global.tazamaVersion }}"
          env:
            - name: FUNCTION_NAME
              value: "admin-service"
            - name: PORT
              value: "3100"
            - name: CONFIGURATION_DATABASE
              value: "configuration"
            - name: EVENT_HISTORY_DATABASE
              value: "event_history"
            - name: EVALUATION_DATABASE
              value: "evaluation"
          envFrom:
            - secretRef:
                name: tazama-shared-secrets
            - configMapRef:
                name: tazama-core-config
          ports:
            - containerPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: {{ .Values.core.adminService.port }}
      targetPort: 3100
  selector:
    app: admin-service
