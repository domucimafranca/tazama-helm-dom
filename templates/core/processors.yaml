{{- range $processor := list "event-director" "typology-processor" "transaction-aggregation-decisioning-processor" "event-flow" }}
{{- $shortName := "" }}
{{- if eq $processor "event-director" }}{{ $shortName = "ed" }}{{ end }}
{{- if eq $processor "typology-processor" }}{{ $shortName = "tp" }}{{ end }}
{{- if eq $processor "transaction-aggregation-decisioning-processor" }}{{ $shortName = "tadp" }}{{ end }}
{{- if eq $processor "event-flow" }}{{ $shortName = "ef" }}{{ end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $shortName }}
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $shortName }}
  template:
    metadata:
      labels:
        app: {{ $shortName }}
    spec:
      initContainers:
        - name: wait-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ $.Values.global.database.host }} 5432; do sleep 2; done;']
        - name: wait-valkey
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ $.Values.global.valkey.host }} 6379; do sleep 2; done;']
        - name: wait-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ $.Values.global.nats.host }} 4222; do sleep 2; done;']
      containers:
        - name: {{ $shortName }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $processor }}:{{ $.Values.global.tazamaVersion }}"
          envFrom:
            - secretRef:
                name: tazama-shared-secrets
            - configMapRef:
                name: tazama-core-config
---
{{- end }}
