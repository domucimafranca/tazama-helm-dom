{{- range $processor := list "event-director" "typology-processor" "transaction-aggregation-decisioning-processor" "event-flow" }}
{{- $shortName := "" }}
{{- if eq $processor "event-director" }}{{ $shortName = "ed" }}{{ end }}
{{- if eq $processor "typology-processor" }}{{ $shortName = "tp" }}{{ end }}
{{- if eq $processor "transaction-aggregation-decisioning-processor" }}{{ $shortName = "tadp" }}{{ end }}
{{- if eq $processor "event-flow" }}{{ $shortName = "ef" }}{{ end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $shortName }}
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $shortName }}
  template:
    metadata:
      labels:
        app: {{ $shortName }}
    spec:
    # START AFFINITY BLOCK
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
                  - key: node-role.kubernetes.io/master
                    operator: DoesNotExist
    # END AFFINITY BLOCK
      initContainers:
        - name: wait-db
          image: "postgres:16"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: tazama-shared-secrets
                  key: CONFIGURATION_DATABASE_PASSWORD
          command:
            - sh
            - -c
            - |
              until psql -h postgres -U postgres -d raw_history -c "SELECT 'pain013'::regclass;" >/dev/null 2>&1; do
                echo "Waiting for the full Tazama database schema to finish initializing..."
                sleep 2
              done
        - name: wait-valkey
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z valkey 6379; do sleep 2; done;']
        - name: wait-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z nats 4222; do sleep 2; done;']
      containers:
        - name: {{ $shortName }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $processor }}:{{ $.Values.global.tazamaVersion }}"
          env:
            - name: STARTUP_TYPE
              value: "nats" 
            - name: APM_SERVICE_NAME
              value: {{ $processor | quote }}
            {{- if eq $shortName "ed" }}
            - name: FUNCTION_NAME
              value: "event-director" 
            - name: CONSUMER_STREAM
              value: "event-director"
            - name: CONFIGURATION_DATABASE
              value: "configuration"
            {{- end }}
            {{- if eq $shortName "tp" }}
            - name: FUNCTION_NAME
              value: "typology-processor"
            - name: CONFIGURATION_DATABASE
              value: "configuration" 
            {{- end }}
            {{- if eq $shortName "tadp" }}
            - name: FUNCTION_NAME
              value: "transaction-aggregation-decisioning-processor" 
            - name: CONFIGURATION_DATABASE
              value: "configuration" 
            - name: RAW_HISTORY_DATABASE
              value: "raw_history"
            - name: EVALUATION_DATABASE
              value: "evaluation"
            {{- end }}
            {{- if eq $shortName "ef" }}
            - name: FUNCTION_NAME
              value: "event-flow-rule-processor"
            - name: RULE_NAME
              value: "EFRuP" 
            - name: RULE_VERSION
              value: "1.0.0" 
            - name: CONFIGURATION_DATABASE
              value: "configuration" 
            {{- end }}
          envFrom:
            - secretRef:
                name: tazama-shared-secrets
            - configMapRef:
                name: tazama-core-config
---
{{- end }}
