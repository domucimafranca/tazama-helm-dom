apiVersion: apps/v1
kind: Deployment
metadata:
  name: tms
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tms
  template:
    metadata:
      labels:
        app: tms
    spec:
      initContainers:
        - name: wait-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.global.database.host }} 5432; do sleep 2; done;']
        - name: wait-valkey
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.global.valkey.host }} 6379; do sleep 2; done;']
        - name: wait-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.global.nats.host }} 4222; do sleep 2; done;']
      containers:
        - name: tms
          image: "{{ .Values.global.imageRegistry }}/tms-service:{{ .Values.global.tazamaVersion }}"
          envFrom:
            - secretRef:
                name: tazama-shared-secrets
            - configMapRef:
                name: tazama-core-config
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: tms-service
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: {{ .Values.core.tms.port }}
      targetPort: 3000
  selector:
    app: tms
