apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: {{ .Values.infrastructure.valkey.image }}
          command: ["valkey-server"]
          args: ["--port", "6379", "--loglevel", "verbose"] # Docker infrastructure target params [cite: 6]
          ports:
            - containerPort: 6379
              name: valkeyport
          livenessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli -p 6379 ping | grep PONG"] # Status verification check [cite: 6]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-service
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: valkey
