{{- range $rule := list "rule-901" "rule-902" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $rule }}
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $rule }}
  template:
    metadata:
      labels:
        app: {{ $rule }}
    spec:
      initContainers:
        - name: wait-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ $.Values.global.database.host }} 5432; do sleep 2; done;']
        - name: wait-valkey
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ $.Values.global.valkey.host }} 6379; do sleep 2; done;']
      containers:
        - name: {{ $rule }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $rule }}:{{ $.Values.global.tazamaVersion }}"
          envFrom:
            - secretRef:
                name: tazama-shared-secrets
            - configMapRef:
                name: tazama-core-config
---
{{- end }}
