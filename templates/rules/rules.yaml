{{- range $rule := list "rule-901" "rule-902" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $rule }}
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $rule }}
  template:
    metadata:
      labels:
        app: {{ $rule }}
    spec:
      initContainers:
        - name: wait-db
          image: "postgres:16"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: tazama-shared-secrets
                  key: CONFIGURATION_DATABASE_PASSWORD
          command:
            - sh
            - -c
            - |
              until psql -h postgres -U postgres -d raw_history -c "SELECT 'pain013'::regclass;" >/dev/null 2>&1; do
                echo "Waiting for the full Tazama database schema to finish initializing..."
                sleep 2
              done
        - name: wait-valkey
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z valkey 6379; do sleep 2; done;']
      containers:
        - name: {{ $rule }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $rule }}:{{ $.Values.global.tazamaVersion }}"
          env:
            - name: STARTUP_TYPE
              value: "nats" 
            - name: CONFIGURATION_DATABASE
              value: "configuration" 
            - name: RAW_HISTORY_DATABASE
              value: "raw_history" 
            - name: EVENT_HISTORY_DATABASE
              value: "event_history" 
            - name: RULE_VERSION
              value: "1.0.0" 
            {{- if eq $rule "rule-901" }}
            - name: FUNCTION_NAME
              value: "rule-901-rel-1-0-0" 
            - name: RULE_NAME
              value: "901"
            {{- end }}
            {{- if eq $rule "rule-902" }}
            - name: FUNCTION_NAME
              value: "rule-902-rel-1-0-0" 
            - name: RULE_NAME
              value: "902" 
            {{- end }}
          envFrom:
            - secretRef:
                name: tazama-shared-secrets
            - configMapRef:
                name: tazama-core-config
---
{{- end }}
